<header class="header">
  <div class="header__container">
    <a class="header__logo" (click)="scrollTo('hero')" style="cursor: pointer;">
      <span class="header__logo-text">Diego</span>
      <span class="header__logo-accent">.dev</span>
    </a>

    <nav class="header__nav">
      @for (item of navItems; track item.label) {
        <a class="header__nav-link" (click)="scrollTo(item.href)">
          {{ item.label | translate }}
        </a>
      }

      <!-- Language Toggle with Flags -->
      <button class="header__lang-btn" (click)="toggleLanguage()" aria-label="Mudar idioma">
        @if (currentLang === 'pt') {
          <!-- USA Flag -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 640 480">
            <g fill-rule="evenodd">
              <g stroke-width="1pt">
                <path fill="#bd3d44" d="M0 0h912v37H0zm0 73.9h912v37H0zm0 73.8h912v37H0zm0 73.8h912v37H0zm0 74h912v36.8H0zm0 73.7h912v37H0z" transform="scale(.9375 1)"/>
                <path fill="#fff" d="M0 37h912v36.9H0zm0 73.8h912v36.9H0zm0 73.8h912v37H0zm0 73.9h912v37H0zm0 73.8h912v37H0zm0 73.8h912v37H0z" transform="scale(.9375 1)"/>
              </g>
              <path fill="#192f5d" d="M0 0h364.8v258.5H0z"/>
              <path fill="#fff" d="m30.4 11 3.4 10.3h10.6l-8.6 6.3 3.3 10.3-8.7-6.4-8.6 6.3L25 27.6l-8.7-6.3h10.9zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.2 10.3-8.6-6.4-8.7 6.3 3.3-10.2-8.6-6.3h10.6zm60.8 0 3.3 10.3H166l-8.6 6.3 3.3 10.3-8.7-6.4-8.7 6.3 3.3-10.2-8.6-6.3h10.6zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.3 10.3-8.7-6.4-8.6 6.3 3.2-10.2-8.6-6.3H179zm60.8 0 3.3 10.3h10.7l-8.6 6.3 3.3 10.3-8.7-6.4-8.7 6.3 3.3-10.2-8.7-6.3h10.8zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.3 10.3-8.7-6.4-8.6 6.3 3.2-10.2-8.6-6.3h10.6z" transform="scale(.9375 1)"/>
            </g>
          </svg>
        } @else {
          <!-- Brazil Flag -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 640 480">
            <g stroke-width="1pt">
              <path fill="#229e45" d="M0 0h640v480H0z"/>
              <path fill="#f8e509" d="m321.4 436 301.5-195.7L319.6 44 17.1 240.7z"/>
              <path fill="#2b49a3" d="M452.8 240c0 70.3-57.1 127.3-127.6 127.3A127.4 127.4 0 1 1 452.8 240z"/>
              <path fill="#ffffef" d="M283.3 316.3l-4-2.3-4 2 .9-4.5-3.2-3.4 4.5-.5 2.1-4.2 1.9 4.3 4.5.6-3.3 3.3zm-21.5-26.8l-4-2.3-4 2 .9-4.5-3.2-3.4 4.5-.5 2.1-4.2 1.9 4.3 4.5.6-3.3 3.3z"/>
            </g>
          </svg>
        }
      </button>

      <!-- Theme Toggle Desktop -->
      <button class="header__theme-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'">
        @if (isDarkMode) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
    </nav>

    <!-- Mobile Actions -->
    <div class="header__mobile-actions">
      <!-- Language Toggle Mobile with Flags -->
      <button class="header__lang-btn" (click)="toggleLanguage()" aria-label="Mudar idioma">
        @if (currentLang === 'pt') {
          <!-- USA Flag -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 640 480">
            <g fill-rule="evenodd">
              <g stroke-width="1pt">
                <path fill="#bd3d44" d="M0 0h912v37H0zm0 73.9h912v37H0zm0 73.8h912v37H0zm0 73.8h912v37H0zm0 74h912v36.8H0zm0 73.7h912v37H0z" transform="scale(.9375 1)"/>
                <path fill="#fff" d="M0 37h912v36.9H0zm0 73.8h912v36.9H0zm0 73.8h912v37H0zm0 73.9h912v37H0zm0 73.8h912v37H0zm0 73.8h912v37H0z" transform="scale(.9375 1)"/>
              </g>
              <path fill="#192f5d" d="M0 0h364.8v258.5H0z"/>
              <path fill="#fff" d="m30.4 11 3.4 10.3h10.6l-8.6 6.3 3.3 10.3-8.7-6.4-8.6 6.3L25 27.6l-8.7-6.3h10.9zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.2 10.3-8.6-6.4-8.7 6.3 3.3-10.2-8.6-6.3h10.6zm60.8 0 3.3 10.3H166l-8.6 6.3 3.3 10.3-8.7-6.4-8.7 6.3 3.3-10.2-8.6-6.3h10.6zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.3 10.3-8.7-6.4-8.6 6.3 3.2-10.2-8.6-6.3H179zm60.8 0 3.3 10.3h10.7l-8.6 6.3 3.3 10.3-8.7-6.4-8.7 6.3 3.3-10.2-8.7-6.3h10.8zm60.8 0 3.3 10.3h10.8l-8.7 6.3 3.3 10.3-8.7-6.4-8.6 6.3 3.2-10.2-8.6-6.3h10.6z" transform="scale(.9375 1)"/>
            </g>
          </svg>
        } @else {
          <!-- Brazil Flag -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 640 480">
            <g stroke-width="1pt">
              <path fill="#229e45" d="M0 0h640v480H0z"/>
              <path fill="#f8e509" d="m321.4 436 301.5-195.7L319.6 44 17.1 240.7z"/>
              <path fill="#2b49a3" d="M452.8 240c0 70.3-57.1 127.3-127.6 127.3A127.4 127.4 0 1 1 452.8 240z"/>
              <path fill="#ffffef" d="M283.3 316.3l-4-2.3-4 2 .9-4.5-3.2-3.4 4.5-.5 2.1-4.2 1.9 4.3 4.5.6-3.3 3.3zm-21.5-26.8l-4-2.3-4 2 .9-4.5-3.2-3.4 4.5-.5 2.1-4.2 1.9 4.3 4.5.6-3.3 3.3z"/>
            </g>
          </svg>
        }
      </button>

      <button class="header__theme-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'">
        @if (isDarkMode) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button class="header__menu-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Menu de navegação">
        <span class="header__menu-icon" [class.active]="isMenuOpen"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Nav -->
  <nav class="header__mobile-nav" [class.active]="isMenuOpen">
    @for (item of navItems; track item.label) {
      <a class="header__mobile-link" (click)="scrollTo(item.href)">
        {{ item.label | translate }}
      </a>
    }
  </nav>
</header>
