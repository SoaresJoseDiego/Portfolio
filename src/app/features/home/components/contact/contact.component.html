<section class="contact" id="contact">
  <div class="contact__container">
    <h2 class="contact__title animate-on-scroll">{{ 'CONTACT.TITLE' | translate }}</h2>
    <p class="contact__subtitle animate-on-scroll">{{ 'CONTACT.SUBTITLE' | translate }}</p>

    <div class="contact__content">
      <!-- Info -->
      <div class="contact__info animate-fade-left">
        @for (info of contactInfo; track info.labelKey) {
          <div class="contact__info-item">
            @switch (info.icon) {
              @case ('email') {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              }
              @case ('location') {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
              }
            }
            <div>
              <span class="contact__info-label">{{ info.labelKey | translate }}</span>
              <span class="contact__info-value">{{ info.value }}</span>
            </div>
          </div>
        }
      </div>

      <!-- Form -->
      <form class="contact__form animate-fade-right" (ngSubmit)="onSubmit()">
        <div class="contact__form-group">
          <label for="name" class="contact__label">{{ 'CONTACT.FORM.NAME' | translate }}</label>
          <input
            type="text"
            id="name"
            class="contact__input"
            [(ngModel)]="formData.name"
            name="name"
            required
            [placeholder]="'CONTACT.FORM.NAME_PLACEHOLDER' | translate"
            [disabled]="isLoading">
        </div>

        <div class="contact__form-group">
          <label for="email" class="contact__label">{{ 'CONTACT.FORM.EMAIL' | translate }}</label>
          <input
            type="email"
            id="email"
            class="contact__input"
            [(ngModel)]="formData.email"
            name="email"
            required
            [placeholder]="'CONTACT.FORM.EMAIL_PLACEHOLDER' | translate"
            [disabled]="isLoading">
        </div>

        <div class="contact__form-group">
          <label for="message" class="contact__label">{{ 'CONTACT.FORM.MESSAGE' | translate }}</label>
          <textarea
            id="message"
            class="contact__input contact__textarea"
            [(ngModel)]="formData.message"
            name="message"
            required
            rows="5"
            [placeholder]="'CONTACT.FORM.MESSAGE_PLACEHOLDER' | translate"
            [disabled]="isLoading"></textarea>
        </div>

        <!-- Status Message -->
        @if (statusMessage) {
          <div class="contact__status" [class.success]="statusType === 'success'" [class.error]="statusType === 'error'">
            {{ statusMessage }}
          </div>
        }

        <button type="submit" class="contact__btn" [disabled]="isLoading">
          @if (isLoading) {
            <span class="contact__btn-loader"></span>
            {{ 'CONTACT.FORM.SENDING' | translate }}
          } @else {
            {{ 'CONTACT.FORM.SUBMIT' | translate }}
          }
        </button>
      </form>
    </div>
  </div>
</section>
