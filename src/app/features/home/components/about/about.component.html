<section class="about" id="about">
  <div class="about__container">
    <h2 class="about__title animate-on-scroll">{{ 'ABOUT.TITLE' | translate }}</h2>

    <div class="about__content">
      <div class="about__text animate-fade-left">
        <p>{{ 'ABOUT.P1' | translate }}</p>
        <p>{{ 'ABOUT.P2' | translate }}</p>
        <p>{{ 'ABOUT.P3' | translate }}</p>
      </div>

      <div class="about__stats animate-fade-right">
        @for (stat of stats; track stat.labelKey) {
          <div class="about__stat">
            <span class="about__stat-value">{{ stat.value }}</span>
            <span class="about__stat-label">{{ stat.labelKey | translate }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
